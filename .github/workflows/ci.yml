name: Esempio di valutazione

# quando devi partire l'automazione
on: [push]

jobs:
  test:
    # ambiente siamo -> sis.op
    runs-on: ubuntu-latest
    steps:
      # scarica il codice
      - name: Scarica codice dal repo
        uses: actions/checkout@v4

      - name: Installa Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Installa dipendenze
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - name: Esegui test
        run: |
          pytest --cov=. --cov-branch --cov-report=term-missing

      


